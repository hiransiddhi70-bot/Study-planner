<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Planner V6.0 - Ultimate Pro</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#6366f1">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="container">
        <!-- HEADER + XP BAR + CONTROLS -->
        <div class="header" style="position:relative;">
            <h1>📚 Study Planner ⚡</h1>
            <p>Level up your studies</p>
            <div style="position:absolute;top:20px;right:20px;display:flex;gap:10px;flex-wrap:wrap;justify-content:flex-end;">
                <button id="exportDataBtn" class="btn btn-secondary" title="Backup Data">💾</button>
                <button id="importDataBtn" class="btn btn-secondary" title="Import Data">📥</button>
                <input type="file" id="importFileInput" accept=".json" style="display:none;">
                <button id="focusModeBtn" class="btn btn-danger">🔥 Focus</button>
                <button id="darkModeToggle" class="btn btn-secondary">🌙</button>
            </div>
            
            <!-- XP BAR -->
            <div style="margin-top:20px;background:var(--card);padding:15px;border-radius:16px;box-shadow:var(--shadow);">
                <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
                    <span style="font-weight:700;color:var(--primary);">Level <span id="userLevel">1</span> - <span id="userTitle">Noob</span></span>
                    <span style="font-weight:600;"><span id="currentXP">0</span> / <span id="nextLevelXP">100</span> XP</span>
                </div>
                <div style="width:100%;height:12px;background:var(--bg);border-radius:10px;overflow:hidden;">
                    <div id="xpBar" style="width:0%;height:100%;background:linear-gradient(90deg,#6366f1,#8b5cf6);transition:width 0.5s;"></div>
                </div>
            </div>
        </div>

        <div class="grid">
            <!-- HABIT TRACKER -->
            <div class="card" style="background: linear-gradient(135deg, #10b981, #059669); color: white;">
                <div class="card-header">
                    <div class="card-icon" style="background: rgba(255,255,255,0.2);">📅</div>
                    <div class="card-title" style="color:white;">Habit Tracker</div>
                    <span id="habitDate" style="margin-left:auto;font-size:0.9rem;opacity:0.9;"></span>
                </div>
                <div id="habitList" style="display:flex;flex-direction:column;gap:12px;"></div>
                <button class="btn" id="addHabitBtn" style="background:white;color:#10b981;width:100%;margin-top:15px;">+ Add Habit</button>
            </div>

            <!-- LEADERBOARD -->
            <div class="card" style="background: linear-gradient(135deg, #f59e0b, #d97706); color: white;">
                <div class="card-header">
                    <div class="card-icon" style="background: rgba(255,255,255,0.2);">🏆</div>
                    <div class="card-title" style="color:white;">Weekly Rank</div>
                </div>
                <div style="text-align:center;margin-bottom:15px;">
                    <div style="font-size:3rem;font-weight:700;" id="weeklyRank">#1</div>
                    <div style="opacity:0.9;">vs Yourself</div>
                </div>
                <div id="weeklyStats" style="background:rgba(0,0,0,0.2);padding:12px;border-radius:10px;font-size:0.9rem;"></div>
            </div>

            <!-- VOICE NOTES -->
            <div class="card" style="background: linear-gradient(135deg, #8b5cf6, #6366f1); color: white;">
                <div class="card-header">
                    <div class="card-icon" style="background: rgba(255,255,255,0.2);">🎙️</div>
                    <div class="card-title" style="color:white;">Voice Notes</div>
                </div>
                <p style="margin-bottom:15px;opacity:0.9;">Bol aur notes bana</p>
                <select id="voiceNoteSubject" style="width:100%;padding:10px;border-radius:8px;border:2px solid rgba(255,255,255,0.3);background:rgba(255,255,255,0.15);color:white;margin-bottom:10px;">
                    <option value="">Subject select kar</option>
                </select>
                <div style="display:flex;gap:10px;margin-bottom:10px;">
                    <button class="btn" id="startVoiceBtn" style="background:white;color:#8b5cf6;flex:1;">🎤 Start</button>
                    <button class="btn" id="stopVoiceBtn" style="background:rgba(255,255,255,0.2);flex:1;" disabled>⏹️ Stop</button>
                </div>
                <div id="voiceOutput" style="background:rgba(0,0,0,0.2);padding:12px;border-radius:10px;min-height:60px;font-size:0.9rem;"></div>
                <button class="btn" id="saveVoiceNoteBtn" style="background:white;color:#8b5cf6;width:100%;margin-top:10px;display:none;">💾 Save Note</button>
            </div>

            <!-- MONTHLY REPORT -->
            <div class="card">
                <div class="card-header">
                    <div class="card-icon" style="background: #c7d2fe;">📊</div>
                    <div class="card-title">Monthly Heatmap</div>
                </div>
                <div id="heatmapCalendar" style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px;font-size:0.7rem;text-align:center;"></div>
                <div style="display:flex;justify-content:space-between;margin-top:15px;font-size:0.8rem;color:var(--text-light);">
                    <span>Less</span>
                    <div style="display:flex;gap:2px;">
                        <div style="width:12px;height:12px;background:#ebedf0;border-radius:2px;"></div>
                        <div style="width:12px;height:12px;background:#9be9a8;border-radius:2px;"></div>
                        <div style="width:12px;height:12px;background:#40c463;border-radius:2px;"></div>
                        <div style="width:12px;height:12px;background:#30a14e;border-radius:2px;"></div>
                        <div style="width:12px;height:12px;background:#216e39;border-radius:2px;"></div>
                    </div>
                    <span>More</span>
                </div>
            </div>
